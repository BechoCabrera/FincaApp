<section class="ui-card">
  <h4 class="section-title">Registrar Cría</h4>

  <form [formGroup]="form" class="ui-form" (ngSubmit)="guardarCria()">
    <div class="ui-grid-3">
      <mat-form-field appearance="fill">
        <mat-label>Número cría</mat-label>
        <input matInput formControlName="numero" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Fecha Nac.</mat-label>
        <input matInput [matDatepicker]="nac" formControlName="fechaNac" />
        <mat-datepicker-toggle matSuffix [for]="nac"></mat-datepicker-toggle>
        <mat-datepicker #nac></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="ui-grid-3">
      <mat-form-field appearance="fill">
        <mat-label>Color</mat-label>
        <input matInput formControlName="color" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Propietario</mat-label>
        <input matInput formControlName="propietario" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Peso (kg)</mat-label>
        <input matInput formControlName="pesoKg" type="number" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="fill" class="ui-field-full">
      <mat-label>Detalles</mat-label>
      <textarea matInput rows="3" formControlName="detalles"></textarea>
    </mat-form-field>

    <div class="ui-actions ui-field-full">
      <button mat-flat-button type="button" class="ui-btn ui-btn-primary-cancel" (click)="form.reset({ fincaId: fincaId ?? null })">Cancelar</button>
      <button mat-flat-button type="submit" class="ui-btn ui-btn-primary">Aceptar cría</button>
    </div>
  </form>
</section>
